name: Build Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-arm64-build-${{ hashFiles('Makefile', 'main.cpp', 'parser.cpp', 'parser.hpp', 'optimizer.cpp', 'optimizer.hpp', 'imgui/**/*.cpp', 'imgui/**/*.h', 'thirdParty/nfd/src/**') }}
          restore-keys: |
            ${{ runner.os }}-arm64-build-
      - name: Install deps
        run: brew install glfw
      - name: Package
        run: make package-macos-arm64 VERSION="${GITHUB_REF_NAME}" ENABLE_LTO=1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sheepram-macos-arm64
          path: dist/*.zip

  macos-x86_64:
    name: macOS x86_64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-x86_64-build-${{ hashFiles('Makefile', 'main.cpp', 'parser.cpp', 'parser.hpp', 'optimizer.cpp', 'optimizer.hpp', 'imgui/**/*.cpp', 'imgui/**/*.h', 'thirdParty/nfd/src/**') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-build-
      - name: Install deps
        run: brew install glfw
      - name: Package
        run: make package-macos-x86_64 VERSION="${GITHUB_REF_NAME}" ENABLE_LTO=1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sheepram-macos-x86_64
          path: dist/*.zip

  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-x86_64-build-${{ hashFiles('Makefile', 'main.cpp', 'parser.cpp', 'parser.hpp', 'optimizer.cpp', 'optimizer.hpp', 'imgui/**/*.cpp', 'imgui/**/*.h', 'thirdParty/nfd/src/**') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-build-
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libglfw3-dev libgtk-3-dev libgl1-mesa-dev
      - name: Package
        run: make package-linux-x86_64 VERSION="${GITHUB_REF_NAME}" ENABLE_LTO=1
      - name: Verify packaged Linux runtime libs
        run: |
          set -euo pipefail
          archive="$(ls -1t dist/Sheepram-*-linux-x86_64.tar.gz | head -n 1)"
          test -n "$archive"
          workdir="$(mktemp -d)"
          tar -xzf "$archive" -C "$workdir"
          app_dir="$(find "$workdir" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -f "$app_dir/Sheepram.bin"
          test -f "$app_dir/Sheepram"
          test -d "$app_dir/lib"
          unresolved="$(LD_LIBRARY_PATH="$app_dir/lib" ldd "$app_dir/Sheepram.bin" | awk '/not found/ {print $1}')"
          if [ -n "$unresolved" ]; then
            echo "Unresolved shared libraries in Linux package:"
            echo "$unresolved"
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sheepram-linux-x86_64
          path: dist/*.tar.gz

  windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glfw
            mingw-w64-x86_64-gtk3
            zip
            unzip
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-x86_64-build-${{ hashFiles('Makefile', 'main.cpp', 'parser.cpp', 'parser.hpp', 'optimizer.cpp', 'optimizer.hpp', 'imgui/**/*.cpp', 'imgui/**/*.h', 'thirdParty/nfd/src/**') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-build-
      - name: Package
        run: make package-windows-x86_64 VERSION="${GITHUB_REF_NAME}" ENABLE_LTO=1
      - name: Verify packaged Windows DLLs
        run: |
          set -euo pipefail
          archive="$(ls -1t dist/Sheepram-*-windows-x86_64.zip | head -n 1)"
          test -n "$archive"
          workdir="$(mktemp -d)"
          unzip -q "$archive" -d "$workdir"
          app_dir="$(find "$workdir" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          exe="$app_dir/Sheepram.exe"
          test -f "$exe"
          missing=0
          while IFS= read -r dll; do
            [ -z "$dll" ] && continue
            dll_upper="$(printf '%s' "$dll" | tr '[:lower:]' '[:upper:]')"
            case "$dll_upper" in
              KERNEL32.DLL|KERNELBASE.DLL|NTDLL.DLL|USER32.DLL|GDI32.DLL|SHELL32.DLL|OLE32.DLL|COMDLG32.DLL|ADVAPI32.DLL|COMCTL32.DLL|IMM32.DLL|OLEAUT32.DLL|WS2_32.DLL|WINMM.DLL|VERSION.DLL|SHLWAPI.DLL|RPCRT4.DLL|SECHOST.DLL|SETUPAPI.DLL|CFGMGR32.DLL|BCRYPT.DLL|CRYPT32.DLL|WLDAP32.DLL|DNSAPI.DLL|IPHLPAPI.DLL|UCRTBASE.DLL|MSVCRT.DLL|OPENGL32.DLL|GLU32.DLL|API-MS-WIN-*.DLL)
                continue
                ;;
            esac
            if [ ! -f "$app_dir/$dll" ]; then
              echo "Missing packaged DLL: $dll"
              missing=1
            fi
          done < <(objdump -p "$exe" | awk '/DLL Name:/ {print $3}')
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sheepram-windows-x86_64
          path: dist/*.zip
